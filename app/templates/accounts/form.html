{% extends "base.html" %}

{% block title %}
{{ page_title }} | VoIP Operations Portal
{% endblock %}

{% block page_header %}
Accounts
{% endblock %}

{% block content %}

<div class="page-heading">

    <div>
        <h1>{{ page_title }}</h1>

        <p>
            Configure operational account information.
        </p>
    </div>

</div>

<div class="form-card">

    <form method="post">

        <div class="form-group">

            <label for="code">
                Account Code
            </label>

            <input
                id="code"
                name="code"
                type="text"
                value="{{ account.code if account else '' }}"
                required
                maxlength="50"
            >

        </div>

        <div class="form-group">

            <label for="name">
                Account Name
            </label>

            <input
                id="name"
                name="name"
                type="text"
                value="{{ account.name if account else '' }}"
                required
                maxlength="255"
            >

        </div>

        <div class="form-group">

            <label for="description">
                Description
            </label>

            <textarea
                id="description"
                name="description"
                rows="5"
            >{{ account.description if account and account.description else '' }}</textarea>

        </div>

        <div class="form-actions">

            <a
                href="{{ url_for('accounts.index') }}"
                class="button button-secondary"
            >
                Cancel
            </a>

            <button
                type="submit"
                class="button button-primary"
            >
                Save Account
            </button>

        </div>

    </form>

</div>

{% endblock %}
