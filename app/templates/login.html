<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >
    <title>Login | VoIP Operations Portal</title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/app.css') }}"
    >
</head>
<body class="login-page">

<div class="login-card">

    <h1>VoIP Operations Portal</h1>

    <p class="subtitle">
        Voice Team Operations Management
    </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    <form method="post">

        <label for="username">Username</label>

        <input
            id="username"
            name="username"
            type="text"
            required
            autofocus
        >

        <label for="password">Password</label>

        <input
            id="password"
            name="password"
            type="password"
            required
        >

        <button type="submit">
            Sign In
        </button>

    </form>

</div>

</body>
</html>
